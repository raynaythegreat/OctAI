services:
  # ─────────────────────────────────────────────
  # OctAi Agent (one-shot query) - Full MCP Support
  #   docker compose -f docker/docker-compose.full.yml run --rm octai-agent -m "Hello"
  # ─────────────────────────────────────────────
  octai-agent:
    build:
      context: ..
      dockerfile: docker/Dockerfile.full
    container_name: octai-agent-full
    profiles:
      - agent
    volumes:
      - ../config/config.json:/root/.octai/config.json:ro
      - octai-workspace:/root/.octai/workspace
      - octai-npm-cache:/root/.npm # npm cache for faster MCP server installs
    entrypoint: ["aibhq", "agent"]
    stdin_open: true
    tty: true

  # ─────────────────────────────────────────────
  # OctAi Gateway (Long-running Bot) - Full MCP Support
  #   docker compose -f docker/docker-compose.full.yml --profile gateway up
  # ─────────────────────────────────────────────
  octai-gateway:
    build:
      context: ..
      dockerfile: docker/Dockerfile.full
    container_name: octai-gateway-full
    restart: unless-stopped
    profiles:
      - gateway
    volumes:
      # Configuration file
      - ../config/config.json:/root/.octai/config.json:ro
      # Persistent workspace (sessions, memory, logs)
      - octai-workspace:/root/.octai/workspace
      # NPM cache for faster MCP server installs
      - octai-npm-cache:/root/.npm
    command: ["gateway"]

volumes:
  octai-workspace:
  octai-npm-cache: # Cache npm packages to speed up MCP server installations
