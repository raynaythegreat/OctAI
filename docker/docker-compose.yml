services:
  # ─────────────────────────────────────────────
  # OctAi Agent (one-shot query)
  #   docker compose -f docker/docker-compose.yml run --rm octai-agent -m "Hello"
  # ─────────────────────────────────────────────
  octai-agent:
    image: docker.io/sipeed/octai:latest
    container_name: octai-agent
    profiles:
      - agent
    # Uncomment to access host network; leave commented unless needed.
    #extra_hosts:
    #  - "host.docker.internal:host-gateway"
    volumes:
      - ./data:/root/.octai
    entrypoint: ["aibhq", "agent"]
    stdin_open: true
    tty: true

  # ─────────────────────────────────────────────
  # OctAi Gateway (Long-running Bot)
  #   docker compose -f docker/docker-compose.yml --profile gateway up
  # ─────────────────────────────────────────────
  octai-gateway:
    image: docker.io/sipeed/octai:latest
    container_name: octai-gateway
    restart: on-failure
    profiles:
      - gateway
    # Uncomment to access host network; leave commented unless needed.
    #extra_hosts:
    #  - "host.docker.internal:host-gateway"
    volumes:
      - ./data:/root/.octai

  # ─────────────────────────────────────────────
  # OctAi Launcher (Web Console + Gateway)
  #   docker compose -f docker/docker-compose.yml --profile launcher up
  # ─────────────────────────────────────────────
  octai-launcher:
    image: docker.io/sipeed/octai:launcher
    container_name: octai-launcher
    restart: on-failure
    profiles:
      - launcher
    environment:
      - OCTAI_GATEWAY_HOST=0.0.0.0
    ports:
      - "127.0.0.1:18800:18800"
      - "127.0.0.1:18790:18790"
    volumes:
      - ./data:/root/.octai
